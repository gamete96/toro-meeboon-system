<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ลงทะเบียนรถ - ตรอ.มีบุญยนตการ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>ลงทะเบียนรถ</h2>

<form id="carForm">

<input type="text" id="name" placeholder="ชื่อเจ้าของรถ"><br><br>

<input type="text" id="phone" placeholder="เบอร์โทร"><br><br>

<input type="text" id="plate" placeholder="ทะเบียนรถ"><br><br>

<input type="text" id="province" placeholder="จังหวัดทะเบียน"><br><br>

<select id="cartype">
<option>รถยนต์</option>
<option>มอเตอร์ไซค์</option>
</select><br><br>

<input type="text" id="brand" placeholder="ยี่ห้อรถ"><br><br>

<input type="text" id="model" placeholder="รุ่น"><br><br>

<label>วันหมดภาษี</label><br>
<input type="date" id="taxExpire"><br><br>

<label>วันหมด พ.ร.บ</label><br>
<input type="date" id="actExpire"><br><br>

<input type="text" id="insurance" placeholder="บริษัทประกัน"><br><br>

<label>วันหมดประกัน</label><br>
<input type="date" id="insExpire"><br><br>

<button type="button" onclick="saveCar()">บันทึกข้อมูล</button>

</form>

<script>

const API = "https://script.google.com/macros/s/AKfycbypc_0QxmBy2kgJ-w3gCLVanOUtI9OqyjtEtP_xH_11cuWJkr7LATyGqaEo2U4qrwI-/exec";

let userId="";

async function main(){

await liff.init({liffId:"2007712329-Qopwa2xa"});

if(!liff.isLoggedIn()){
liff.login();
}

const profile = await liff.getProfile();

userId = profile.userId;

}

main();

function saveCar(){

const data = {

action:"register",
lineUserId:userId,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
plate:document.getElementById("plate").value,
province:document.getElementById("province").value,
cartype:document.getElementById("cartype").value,
brand:document.getElementById("brand").value,
model:document.getElementById("model").value,
taxExpire:document.getElementById("taxExpire").value,
actExpire:document.getElementById("actExpire").value,
insurance:document.getElementById("insurance").value,
insExpire:document.getElementById("insExpire").value

};

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.text())
.then(res=>{

alert("บันทึกข้อมูลเรียบร้อย");

liff.closeWindow();

});

}

</script>

</body>
</html>
