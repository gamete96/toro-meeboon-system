<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>รถของฉัน</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>รถของฉัน</h2>

<div id="carList"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbypc_0QxmBy2kgJ-w3gCLVanOUtI9OqyjtEtP_xH_11cuWJkr7LATyGqaEo2U4qrwI-/exec";

async function main(){

await liff.init({liffId:"2007712329-ryAesyFb"});

const profile = await liff.getProfile();

loadCars(profile.userId);

}

async function loadCars(userId){

const res = await fetch(API+"?action=mycars&userId="+userId);

const cars = await res.json();

let html="";

cars.forEach(car=>{

html+=`
<div style="border:1px solid #ccc;padding:10px;margin:10px;">
<b>ทะเบียน :</b> ${car.plate}<br>
<b>รถ :</b> ${car.brand} ${car.model}<br>
<b>ภาษีหมด :</b> ${car.tax}<br>
<b>พ.ร.บ :</b> ${car.act}<br>
<b>ประกัน :</b> ${car.insurance}
</div>
`;

});

document.getElementById("carList").innerHTML=html;

}

main();

</script>

</body>
</html>
